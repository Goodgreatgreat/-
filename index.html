<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>簽到存摺</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFF1F6;
    --card:#FFFFFF;
    --ink:#4A2A38;
    --ink-soft:#9A7282;
    --primary:#E85C8A;
    --primary-dark:#C23B66;
    --primary-light:#FBD3E1;
    --money:#C2185B;
    --penalty:#9B3A4D;
    --line:#F4CEDC;
    font-size:16px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      repeating-linear-gradient(0deg, transparent 0px, transparent 31px, var(--line) 32px),
      var(--bg);
    background-attachment:local;
    color:var(--ink);
    font-family:'Noto Sans TC', sans-serif;
    min-height:100vh;
    padding:28px 16px 80px;
  }
  .wrap{max-width:680px;margin:0 auto;}

  /* ---------- Header (dreamy pastel) ---------- */
  .cover{
    background:linear-gradient(135deg, #FDF1F6 0%, #FAE0EE 45%, #F3D6EC 100%);
    color:var(--ink);
    border-radius:18px;
    padding:28px 26px 24px;
    position:relative;
    overflow:hidden;
    box-shadow:0 14px 30px -18px rgba(195,140,180,.45);
  }
  .cover::before, .cover::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(28px);
    opacity:.6;
    pointer-events:none;
  }
  .cover::before{ width:170px; height:170px; background:#FFE1F0; top:-70px; right:-50px; }
  .cover::after{ width:130px; height:130px; background:#E3D6FA; bottom:-55px; left:-30px; }
  .cover-inner{position:relative; z-index:1;}
  .cover .eyebrow{
    font-family:'JetBrains Mono', monospace;
    letter-spacing:.18em;
    font-size:11px;
    color:#C684A6;
    text-transform:uppercase;
  }
  .cover h1{
    font-family:'Noto Serif TC', serif;
    font-weight:900;
    font-size:30px;
    margin:6px 0 4px;
    letter-spacing:.04em;
    color:#7A3A58;
  }
  .cover .reset-note{
    font-size:11.5px;
    color:#A8728F;
    margin-bottom:16px;
  }
  .cover .stats{
    display:flex;
    gap:16px;
    flex-wrap:wrap;
  }
  .stat-block{flex:1;min-width:110px;}
  .stat-label{font-size:11.5px;color:#C087A6;margin-bottom:4px;}
  .stat-value{
    font-family:'JetBrains Mono', monospace;
    font-weight:700;
    font-size:22px;
    color:#7A3A58;
  }
  .stat-value.small{font-size:17px;}
  .stat-value.penalty-stat{color:#B5536F;}

  /* ---------- Section header ---------- */
  .section-title{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin:30px 0 12px;
    flex-wrap:wrap;
    gap:10px;
  }
  .section-title h2{
    font-family:'Noto Serif TC', serif;
    font-size:18px;
    font-weight:700;
    margin:0;
    color:var(--ink);
  }
  .section-title .sub{font-size:12px;color:var(--ink-soft);}

  .add-btn{
    background:var(--primary);
    color:#fff;
    border:none;
    border-radius:10px;
    padding:9px 16px;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
    font-family:'Noto Sans TC',sans-serif;
    box-shadow:0 6px 14px -6px rgba(232,92,138,.55);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .add-btn:hover{transform:translateY(-1px);}
  .add-btn:active{transform:translateY(0);}

  /* ---------- Item row ---------- */
  .items{display:flex; flex-direction:column; gap:14px;}
  .item{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:16px 18px;
    position:relative;
    overflow:hidden;
  }
  .item-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
  }
  .name-swatch{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:22px;height:22px;
    border-radius:50%;
    font-size:11px;
    color:#fff;
    margin-right:7px;
    vertical-align:middle;
    flex-shrink:0;
  }
  .item-name{
    font-family:'Noto Serif TC', serif;
    font-weight:700;
    font-size:17px;
    color:var(--ink);
    display:inline-flex;
    align-items:center;
  }
  .item-rule{
    font-size:11.5px;
    color:var(--ink-soft);
    margin-top:5px;
    font-family:'JetBrains Mono', monospace;
    line-height:1.6;
    padding-left:29px;
  }
  .item-actions{display:flex; gap:6px;}
  .icon-btn{
    background:transparent;
    border:none;
    cursor:pointer;
    color:var(--ink-soft);
    font-size:15px;
    padding:4px 6px;
    border-radius:6px;
  }
  .icon-btn:hover{background:var(--primary-light); color:var(--primary-dark);}

  .item-mid{
    margin-top:14px;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:14px;
    flex-wrap:wrap;
  }

  .grid{display:flex; gap:6px; flex-wrap:wrap; max-width:380px;}
  .grid-cell{
    display:flex;
    flex-direction:column;
    align-items:center;
    width:28px;
  }
  .cell-icon{
    width:24px;height:24px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:13px;
    background:var(--primary-light);
    border:1px solid var(--line);
    color:transparent;
  }
  .cell-icon.filled{
    background:var(--primary);
    border-color:var(--primary-dark);
  }
  .cell-icon.next-slot{
    background:#fff;
    border:1.5px dashed var(--primary);
  }
  .cell-date{
    font-size:9.5px;
    color:var(--ink-soft);
    margin-top:3px;
    font-family:'JetBrains Mono', monospace;
    white-space:nowrap;
  }

  .money-block{text-align:right;}
  .money-label{font-size:11px; color:var(--ink-soft);}
  .money-value{
    font-family:'JetBrains Mono', monospace;
    font-weight:700;
    font-size:19px;
    color:var(--money);
  }
  .money-sub{font-size:10.5px; color:var(--penalty); margin-top:2px;}

  .item-bottom{margin-top:14px; display:flex; justify-content:flex-end;}
  .checkin-btn{
    border:none;
    border-radius:999px;
    padding:10px 22px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    font-family:'Noto Sans TC',sans-serif;
    background:var(--primary);
    color:#fff;
    display:flex;
    align-items:center;
    gap:6px;
    box-shadow:0 8px 16px -8px rgba(194,59,102,.55);
    transition:transform .12s ease;
  }
  .checkin-btn:hover{transform:translateY(-1px);}
  .checkin-btn:disabled{
    background:var(--primary-light);
    color:var(--ink-soft);
    box-shadow:none;
    cursor:default;
  }

  .stamp-mark{
    position:absolute;
    top:14px; right:16px;
    width:60px;height:60px;
    border:3px solid var(--primary-dark);
    border-radius:50%;
    background:#fff;
    color:var(--primary-dark);
    display:flex;align-items:center;justify-content:center;
    font-size:30px;
    transform:rotate(-18deg) scale(0);
    opacity:0;
    pointer-events:none;
  }
  @keyframes stampIn{
    0%{transform:rotate(-18deg) scale(2.4); opacity:0;}
    55%{transform:rotate(-12deg) scale(.9); opacity:1;}
    75%{transform:rotate(-15deg) scale(1.08);}
    100%{transform:rotate(-14deg) scale(1); opacity:1;}
  }
  .stamp-mark.play{animation:stampIn .5s cubic-bezier(.2,.8,.3,1) forwards;}

  .empty-state{
    text-align:center;
    padding:40px 20px;
    color:var(--ink-soft);
    font-size:14px;
    border:1.5px dashed var(--line);
    border-radius:14px;
  }

  /* ---------- Calendar ---------- */
  .calendar-section{margin-top:36px;}
  .cal-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:18px;
  }
  .cal-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
    flex-wrap:wrap;
    gap:10px;
  }
  .cal-nav{display:flex; align-items:center; gap:10px;}
  .cal-nav button{
    background:#FFF6FA;
    border:1px solid var(--line);
    border-radius:8px;
    width:30px;height:30px;
    cursor:pointer;
    color:var(--primary-dark);
    font-size:14px;
  }
  .cal-title{
    font-family:'Noto Serif TC', serif;
    font-weight:700;
    font-size:16px;
    min-width:96px;
    text-align:center;
  }
  .cal-filter-wrap{position:relative;}
  .cal-filter-btn{
    background:#FFF6FA;
    border:1px solid var(--line);
    border-radius:8px;
    padding:8px 12px;
    font-size:12.5px;
    cursor:pointer;
    color:var(--ink);
    font-family:'Noto Sans TC',sans-serif;
  }
  .cal-filter-panel{
    position:absolute;
    right:0; top:calc(100% + 6px);
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px;
    width:230px;
    box-shadow:0 16px 32px -12px rgba(122,39,72,.28);
    display:none;
    z-index:30;
  }
  .cal-filter-panel.open{display:block;}
  .cal-filter-actions{display:flex; gap:8px; margin-bottom:8px;}
  .cal-filter-actions button{
    flex:1; font-size:11px; padding:5px;
    border-radius:6px; border:1px solid var(--line);
    background:#FFF6FA; cursor:pointer; color:var(--ink-soft);
  }
  .cal-filter-list{max-height:220px; overflow-y:auto;}
  .cal-filter-item{
    display:flex; align-items:center; gap:8px;
    padding:6px 2px; font-size:12.5px; cursor:pointer;
  }
  .cal-filter-item input{margin:0;}
  .cal-swatch{
    width:16px;height:16px;border-radius:50%;
    flex-shrink:0; display:flex; align-items:center; justify-content:center;
    font-size:9px; color:#fff;
  }
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:5px;}
  .cal-weekday{
    text-align:center; font-size:11px; color:var(--ink-soft);
    padding-bottom:4px; font-family:'JetBrains Mono',monospace;
  }
  .cal-day{
    background:#FFFAFC;
    border:1px solid var(--line);
    border-radius:8px;
    min-height:54px;
    padding:4px 3px;
    display:flex;
    flex-direction:column;
    gap:3px;
  }
  .cal-day.empty{background:transparent; border:none;}
  .cal-day.today{border:1.5px solid var(--primary);}
  .cal-daynum{font-size:10.5px; color:var(--ink-soft); font-family:'JetBrains Mono',monospace;}
  .cal-badges{display:flex; flex-wrap:wrap; gap:2px;}
  .cal-badge{
    width:16px;height:16px;border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:9px; color:#fff; line-height:1;
  }
  .cal-empty-note{
    text-align:center; font-size:12.5px; color:var(--ink-soft);
    padding:30px 10px;
  }

  /* ---------- Modal ---------- */
  .modal-overlay{
    position:fixed; inset:0;
    background:rgba(122,39,72,.35);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:50;
  }
  .modal-overlay.open{display:flex;}
  .modal{
    background:var(--card);
    border-radius:16px;
    padding:24px;
    max-width:380px;
    width:100%;
    max-height:88vh;
    overflow-y:auto;
    box-shadow:0 30px 60px -20px rgba(122,39,72,.45);
  }
  .modal h3{
    font-family:'Noto Serif TC', serif;
    margin:0 0 16px;
    font-size:18px;
    color:var(--ink);
  }
  .field{margin-bottom:14px;}
  .field label{
    display:block;
    font-size:12px;
    color:var(--ink-soft);
    margin-bottom:5px;
    font-weight:500;
  }
  .field input{
    width:100%;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:8px;
    font-size:14px;
    background:#FFFAFC;
    color:var(--ink);
    font-family:'Noto Sans TC',sans-serif;
  }
  .field input[type=color]{padding:4px; height:40px;}
  .field input:focus{outline:2px solid var(--primary); outline-offset:1px;}
  .field-row{display:flex; gap:10px;}
  .field-row .field{flex:1;}
  .field-hint{font-size:11px; color:var(--ink-soft); margin-top:-4px; margin-bottom:14px;}

  .modal-actions{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:18px;
  }
  .btn{
    border:none;
    border-radius:8px;
    padding:10px 18px;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
    font-family:'Noto Sans TC',sans-serif;
  }
  .btn-primary{background:var(--primary); color:#fff;}
  .btn-secondary{background:transparent; color:var(--ink-soft);}
  .btn-danger{background:transparent; color:var(--penalty); font-size:12px;}

  footer.note{
    text-align:center;
    font-size:11px;
    color:var(--ink-soft);
    margin-top:36px;
  }

  @media (max-width:480px){
    .cover h1{font-size:24px;}
    .stat-value{font-size:19px;}
    .cal-day{min-height:46px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="cover">
    <div class="cover-inner">
      <div class="eyebrow">DAILY CHECK-IN PASSBOOK</div>
      <h1>簽到存摺</h1>
      <div class="reset-note">每日凌晨 4:00 結算前一日狀況，未簽到將自動扣款</div>
      <div class="stats">
        <div class="stat-block">
          <div class="stat-label">總累積金額</div>
          <div class="stat-value" id="totalMoney">$0</div>
        </div>
        <div class="stat-block">
          <div class="stat-label">今日已簽到</div>
          <div class="stat-value small" id="todayCount">0 / 0</div>
        </div>
        <div class="stat-block">
          <div class="stat-label">累計簽到次數</div>
          <div class="stat-value small" id="totalCheckins">0</div>
        </div>
        <div class="stat-block">
          <div class="stat-label">累計扣款</div>
          <div class="stat-value small penalty-stat" id="totalPenalty">$0</div>
        </div>
      </div>
    </div>
  </div>

  <div class="section-title">
    <div>
      <h2>簽到項目</h2>
      <div class="sub">每個項目每天只能簽到一次</div>
    </div>
    <button class="add-btn" id="openAddBtn">＋ 新增項目</button>
  </div>

  <div class="items" id="itemsList"></div>

  <div class="calendar-section">
    <div class="section-title">
      <div>
        <h2>月曆紀錄</h2>
        <div class="sub">查看每天完成了哪些項目</div>
      </div>
    </div>
    <div class="cal-card">
      <div class="cal-header">
        <div class="cal-nav">
          <button id="calPrev">◀</button>
          <div class="cal-title" id="calTitle">2026年6月</div>
          <button id="calNext">▶</button>
        </div>
        <div class="cal-filter-wrap">
          <button class="cal-filter-btn" id="calFilterBtn">顯示項目 ▾</button>
          <div class="cal-filter-panel" id="calFilterPanel">
            <div class="cal-filter-actions">
              <button id="calSelectAll">全選</button>
              <button id="calSelectNone">取消全選</button>
            </div>
            <div class="cal-filter-list" id="calFilterList"></div>
          </div>
        </div>
      </div>
      <div id="calBody"></div>
    </div>
  </div>

  <footer class="note">資料會自動儲存在你的裝置／帳號中，重新整理或更新頁面也不會消失。金額、獎勵、扣款與顯示樣式皆可自由編輯。</footer>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">新增簽到項目</h3>
    <div class="field">
      <label for="fName">項目名稱</label>
      <input type="text" id="fName" placeholder="例如：每日喝水、閱讀 30 分鐘">
    </div>
    <div class="field-row">
      <div class="field">
        <label for="fIcon">圖標／文字</label>
        <input type="text" id="fIcon" placeholder="例如：💧 或 讀" maxlength="4">
      </div>
      <div class="field">
        <label for="fColor">顏色</label>
        <input type="color" id="fColor" value="#E85C8A">
      </div>
    </div>
    <div class="field">
      <label for="fPer">每次簽到獲得金額（元）</label>
      <input type="number" id="fPer" placeholder="例如：5" min="0" step="0.1">
    </div>
    <div class="field-row">
      <div class="field">
        <label for="fMilestoneCount">每滿幾次給獎金 / 格子數</label>
        <input type="number" id="fMilestoneCount" placeholder="例如：7（留空預設7格）" min="1" step="1">
      </div>
      <div class="field">
        <label for="fMilestoneBonus">獎金金額（元）</label>
        <input type="number" id="fMilestoneBonus" placeholder="例如：20" min="0" step="0.1">
      </div>
    </div>
    <div class="field-hint">簽到格子數量會隨「每滿幾次」自動調整，並在格子下方標示日期。</div>
    <div class="field">
      <label for="fPenalty">未簽到扣款金額（元）</label>
      <input type="number" id="fPenalty" placeholder="例如：3（留空或0表示不扣款）" min="0" step="0.1">
    </div>
    <div class="field-hint">每日凌晨 4:00 結算前一日，若當日未簽到會自動扣這個金額。</div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="deleteItemBtn" style="display:none;">刪除此項目</button>
      <div style="margin-left:auto; display:flex; gap:8px;">
        <button class="btn btn-secondary" id="cancelBtn">取消</button>
        <button class="btn btn-primary" id="saveBtn">儲存</button>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  const STORAGE_KEY = 'checkin-passbook-items';
  const CAL_KEY = 'checkin-passbook-calendar-selected';
  let items = [];
  let editingId = null;
  let calSelected = [];

  const ICON_ROTATION = ['💧','📘','💪','✨','🎯','🌙','🍀','🎨'];
  const COLOR_ROTATION = ['#A6C2F2','#C9A6F2','#F2C49A','#F2A6C6','#A6E0CB','#F2E2A6','#A6D8F2','#E3B6F2'];

  // ---- storage abstraction: uses Claude's secure storage when available,
  // falls back to localStorage when the page is opened outside Claude.ai
  // (e.g. saved/opened directly as a file in a mobile browser). ----
  const hasClaudeStorage = typeof window.storage !== 'undefined'
    && typeof window.storage.get === 'function'
    && typeof window.storage.set === 'function';

  async function storageGet(key){
    if(hasClaudeStorage){
      try{ return await window.storage.get(key, false); }
      catch(e){ return null; }
    }
    try{
      const raw = localStorage.getItem(key);
      return raw !== null ? { value: raw } : null;
    } catch(e){ return null; }
  }
  async function storageSet(key, value){
    if(hasClaudeStorage){
      try{ return await window.storage.set(key, value, false); }
      catch(e){ return null; }
    }
    try{ localStorage.setItem(key, value); return { value }; }
    catch(e){ return null; }
  }

  // ---- date helpers (day resets at 04:00) ----
  function formatDate(dt){
    return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
  }
  function getEffectiveDateStr(d){
    const dt = new Date(d.getTime());
    dt.setHours(dt.getHours() - 4);
    return formatDate(dt);
  }
  function addDaysStr(dateStr, delta){
    const [y,m,d] = dateStr.split('-').map(Number);
    const dt = new Date(y, m-1, d, 12, 0, 0);
    dt.setDate(dt.getDate() + delta);
    return formatDate(dt);
  }
  function formatShort(dateStr){
    const parts = dateStr.split('-');
    return parseInt(parts[1],10) + '/' + parseInt(parts[2],10);
  }
  function uid(){ return 'i' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
  function fmtMoney(n){
    const sign = n < 0 ? '-' : '';
    n = Math.abs(n);
    const rounded = Math.round(n * 100) / 100;
    return sign + '$' + rounded.toLocaleString('en-US', {minimumFractionDigits: (rounded % 1 === 0 ? 0 : 2), maximumFractionDigits:2});
  }
  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function defaultItems(eff){
    return [
      { id: uid(), name: '每日喝水提醒', icon:'💧', color:'#A6C2F2', perCheckin: 5, milestoneCount: 7, milestoneBonus: 20, penaltyPerMiss: 2, checkins: [], missed: [], lastSettledDate: eff },
      { id: uid(), name: '閱讀 30 分鐘', icon:'📘', color:'#C9A6F2', perCheckin: 10, milestoneCount: 7, milestoneBonus: 50, penaltyPerMiss: 0, checkins: [], missed: [], lastSettledDate: eff },
      { id: uid(), name: '運動健身', icon:'💪', color:'#F2C49A', perCheckin: 15, milestoneCount: 30, milestoneBonus: 200, penaltyPerMiss: 5, checkins: [], missed: [], lastSettledDate: eff }
    ];
  }

  async function loadData(){
    const eff = getEffectiveDateStr(new Date());
    try{
      const res = await storageGet(STORAGE_KEY);
      if(res && res.value){
        items = JSON.parse(res.value);
        items.forEach((it, idx) => {
          if(it.missed === undefined) it.missed = [];
          if(it.penaltyPerMiss === undefined || it.penaltyPerMiss === null) it.penaltyPerMiss = 0;
          if(!it.lastSettledDate) it.lastSettledDate = eff;
          if(!it.icon) it.icon = ICON_ROTATION[idx % ICON_ROTATION.length];
          if(!it.color) it.color = COLOR_ROTATION[idx % COLOR_ROTATION.length];
        });
      } else {
        items = defaultItems(eff);
      }
    } catch(e){
      items = defaultItems(eff);
    }

    let changed = false;
    items.forEach(it => { if(settleItem(it, eff)) changed = true; });
    await saveData();

    const calRes = await storageGet(CAL_KEY);
    if(calRes && calRes.value){
      try{ calSelected = JSON.parse(calRes.value); } catch(e){ calSelected = items.map(i => i.id); }
    } else {
      calSelected = items.map(i => i.id);
    }
    // make sure any newly-seen items are included by default
    items.forEach(it => { if(!calSelected.includes(it.id)) calSelected.push(it.id); });

    render();
    renderCalendar();
  }

  function settleItem(item, effectiveToday){
    let cursor = addDaysStr(item.lastSettledDate, 1);
    let changed = false;
    let guard = 0;
    while(cursor < effectiveToday && guard < 3650){
      if(!item.checkins.includes(cursor) && !item.missed.includes(cursor)){
        item.missed.push(cursor);
        changed = true;
      }
      cursor = addDaysStr(cursor, 1);
      guard++;
    }
    if(item.lastSettledDate < addDaysStr(effectiveToday, -1)){
      item.lastSettledDate = addDaysStr(effectiveToday, -1);
      changed = true;
    }
    return changed;
  }

  async function saveData(){ await storageSet(STORAGE_KEY, JSON.stringify(items)); }
  async function saveCalSelection(){ await storageSet(CAL_KEY, JSON.stringify(calSelected)); }

  function calcItemStats(item){
    const count = item.checkins.length;
    const base = count * (Number(item.perCheckin) || 0);
    let bonus = 0;
    const ms = Number(item.milestoneCount) || 0;
    if(ms > 0){
      const hits = Math.floor(count / ms);
      bonus = hits * (Number(item.milestoneBonus) || 0);
    }
    const missedCount = (item.missed || []).length;
    const penalty = missedCount * (Number(item.penaltyPerMiss) || 0);
    return { count, missedCount, penalty, total: base + bonus - penalty };
  }

  function buildGrid(item, effectiveToday, doneToday){
    const gridSize = (Number(item.milestoneCount) > 0) ? Number(item.milestoneCount) : 7;
    const cells = [];
    if(Number(item.milestoneCount) > 0){
      const sorted = item.checkins.slice().sort();
      const count = sorted.length;
      const filledCount = count % gridSize;
      const cycleDates = filledCount > 0 ? sorted.slice(count - filledCount) : [];
      for(let i = 0; i < gridSize; i++){
        if(i < filledCount){
          cells.push({ filled: true, date: cycleDates[i] });
        } else {
          cells.push({ filled: false, date: null, isNext: (i === filledCount && !doneToday) });
        }
      }
    } else {
      for(let i = gridSize - 1; i >= 0; i--){
        const ds = addDaysStr(effectiveToday, -i);
        cells.push({ filled: item.checkins.includes(ds), date: ds });
      }
    }
    return cells;
  }

  function render(){
    const list = document.getElementById('itemsList');
    list.innerHTML = '';

    if(items.length === 0){
      list.innerHTML = '<div class="empty-state">還沒有任何簽到項目<br>點上方「＋ 新增項目」開始建立吧</div>';
    }

    const effectiveToday = getEffectiveDateStr(new Date());
    let grandTotal = 0, totalCheckinsAll = 0, todayDone = 0, grandPenalty = 0;

    items.forEach(item => {
      const { count, missedCount, penalty, total } = calcItemStats(item);
      grandTotal += total;
      totalCheckinsAll += count;
      grandPenalty += penalty;
      const doneToday = item.checkins.includes(effectiveToday);
      if(doneToday) todayDone++;

      const el = document.createElement('div');
      el.className = 'item';

      const cells = buildGrid(item, effectiveToday, doneToday);
      let gridHtml = '';
      cells.forEach(c => {
        const cls = c.filled ? 'filled' : (c.isNext ? 'next-slot' : '');
        gridHtml += `<div class="grid-cell">
            <div class="cell-icon ${cls}">${c.filled ? '👍' : ''}</div>
            <div class="cell-date">${c.date ? formatShort(c.date) : ''}</div>
          </div>`;
      });

      const ms = Number(item.milestoneCount) || 0;
      const milestoneText = (ms > 0 && item.milestoneBonus)
        ? `每滿 ${ms} 次 +${item.milestoneBonus} 元獎金`
        : '無里程碑獎金';
      const penaltyText = (Number(item.penaltyPerMiss) > 0)
        ? `・未簽到扣 ${item.penaltyPerMiss} 元`
        : '';

      el.innerHTML = `
        <div class="stamp-mark" data-stamp>👍</div>
        <div class="item-top">
          <div>
            <div class="item-name"><span class="name-swatch" style="background:${item.color}">${escapeHtml(item.icon)}</span>${escapeHtml(item.name)}</div>
            <div class="item-rule">每次 +${item.perCheckin} 元 ・ ${milestoneText}${penaltyText}</div>
          </div>
          <div class="item-actions">
            <button class="icon-btn" data-edit="${item.id}" title="編輯">✎</button>
          </div>
        </div>
        <div class="item-mid">
          <div class="grid">${gridHtml}</div>
          <div class="money-block">
            <div class="money-label">累積 ${count} 次</div>
            <div class="money-value">${fmtMoney(total)}</div>
            ${missedCount > 0 ? `<div class="money-sub">已扣款 ${missedCount} 次 (-${fmtMoney(penalty).replace('-','').replace('$','')})</div>` : ''}
          </div>
        </div>
        <div class="item-bottom">
          <button class="checkin-btn" data-checkin="${item.id}" ${doneToday ? 'disabled' : ''}>
            ${doneToday ? '👍 今日已簽到' : '今日簽到'}
          </button>
        </div>
      `;
      list.appendChild(el);
    });

    document.getElementById('totalMoney').textContent = fmtMoney(grandTotal);
    document.getElementById('todayCount').textContent = `${todayDone} / ${items.length}`;
    document.getElementById('totalCheckins').textContent = totalCheckinsAll;
    document.getElementById('totalPenalty').textContent = fmtMoney(-grandPenalty);

    list.querySelectorAll('[data-checkin]').forEach(btn => {
      btn.addEventListener('click', () => doCheckin(btn.getAttribute('data-checkin'), btn));
    });
    list.querySelectorAll('[data-edit]').forEach(btn => {
      btn.addEventListener('click', () => openEdit(btn.getAttribute('data-edit')));
    });
  }

  async function doCheckin(id, btnEl){
    const item = items.find(i => i.id === id);
    if(!item) return;
    const eff = getEffectiveDateStr(new Date());
    if(item.checkins.includes(eff)) return;
    item.checkins.push(eff);
    item.missed = (item.missed || []).filter(d => d !== eff);
    await saveData();
    render();
    renderCalendar();

    const newCard = Array.from(document.querySelectorAll('.item')).find(c => c.querySelector(`[data-checkin="${id}"]`));
    if(newCard){
      const s = newCard.querySelector('[data-stamp]');
      requestAnimationFrame(() => { s.classList.add('play'); });
    }
  }

  // ---------- Calendar ----------
  let calYear, calMonth; // calMonth: 0-indexed
  (function initCalDate(){
    const now = new Date();
    calYear = now.getFullYear();
    calMonth = now.getMonth();
  })();

  function renderCalendar(){
    const titleEl = document.getElementById('calTitle');
    titleEl.textContent = `${calYear}年${calMonth + 1}月`;

    const body = document.getElementById('calBody');
    const visibleItems = items.filter(it => calSelected.includes(it.id));

    if(items.length === 0){
      body.innerHTML = '<div class="cal-empty-note">尚無簽到項目，新增項目後即可在月曆看到紀錄</div>';
      renderCalFilterList();
      return;
    }

    const weekdayNames = ['日','一','二','三','四','五','六'];
    let html = '<div class="cal-grid">';
    weekdayNames.forEach(w => { html += `<div class="cal-weekday">${w}</div>`; });

    const firstDay = new Date(calYear, calMonth, 1);
    const startWeekday = firstDay.getDay();
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    const todayStr = formatDate(new Date());

    for(let i = 0; i < startWeekday; i++){
      html += '<div class="cal-day empty"></div>';
    }

    for(let day = 1; day <= daysInMonth; day++){
      const dt = new Date(calYear, calMonth, day, 12, 0, 0);
      const ds = formatDate(dt);
      const isToday = ds === todayStr;
      let badges = '';
      visibleItems.forEach(it => {
        if(it.checkins.includes(ds)){
          badges += `<div class="cal-badge" style="background:${it.color}" title="${escapeHtml(it.name)}">${escapeHtml(it.icon)}</div>`;
        }
      });
      html += `<div class="cal-day ${isToday ? 'today' : ''}">
          <div class="cal-daynum">${day}</div>
          <div class="cal-badges">${badges}</div>
        </div>`;
    }

    html += '</div>';
    body.innerHTML = html;

    renderCalFilterList();
  }

  function renderCalFilterList(){
    const listEl = document.getElementById('calFilterList');
    listEl.innerHTML = '';
    items.forEach(it => {
      const row = document.createElement('label');
      row.className = 'cal-filter-item';
      const checked = calSelected.includes(it.id);
      row.innerHTML = `
        <input type="checkbox" data-cal-toggle="${it.id}" ${checked ? 'checked' : ''}>
        <span class="cal-swatch" style="background:${it.color}">${escapeHtml(it.icon)}</span>
        <span>${escapeHtml(it.name)}</span>
      `;
      listEl.appendChild(row);
    });
    listEl.querySelectorAll('[data-cal-toggle]').forEach(cb => {
      cb.addEventListener('change', async () => {
        const id = cb.getAttribute('data-cal-toggle');
        if(cb.checked){
          if(!calSelected.includes(id)) calSelected.push(id);
        } else {
          calSelected = calSelected.filter(x => x !== id);
        }
        await saveCalSelection();
        renderCalendar();
      });
    });
  }

  document.getElementById('calPrev').addEventListener('click', () => {
    calMonth--;
    if(calMonth < 0){ calMonth = 11; calYear--; }
    renderCalendar();
  });
  document.getElementById('calNext').addEventListener('click', () => {
    calMonth++;
    if(calMonth > 11){ calMonth = 0; calYear++; }
    renderCalendar();
  });

  const calFilterBtn = document.getElementById('calFilterBtn');
  const calFilterPanel = document.getElementById('calFilterPanel');
  calFilterBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    calFilterPanel.classList.toggle('open');
  });
  document.addEventListener('click', (e) => {
    if(!calFilterPanel.contains(e.target) && e.target !== calFilterBtn){
      calFilterPanel.classList.remove('open');
    }
  });
  document.getElementById('calSelectAll').addEventListener('click', async () => {
    calSelected = items.map(i => i.id);
    await saveCalSelection();
    renderCalendar();
  });
  document.getElementById('calSelectNone').addEventListener('click', async () => {
    calSelected = [];
    await saveCalSelection();
    renderCalendar();
  });

  // ---------- Modal logic ----------
  const overlay = document.getElementById('modalOverlay');
  const modalTitle = document.getElementById('modalTitle');
  const fName = document.getElementById('fName');
  const fIcon = document.getElementById('fIcon');
  const fColor = document.getElementById('fColor');
  const fPer = document.getElementById('fPer');
  const fMilestoneCount = document.getElementById('fMilestoneCount');
  const fMilestoneBonus = document.getElementById('fMilestoneBonus');
  const fPenalty = document.getElementById('fPenalty');
  const deleteBtn = document.getElementById('deleteItemBtn');

  function openAdd(){
    editingId = null;
    modalTitle.textContent = '新增簽到項目';
    fName.value = '';
    const idx = items.length;
    fIcon.value = ICON_ROTATION[idx % ICON_ROTATION.length];
    fColor.value = COLOR_ROTATION[idx % COLOR_ROTATION.length];
    fPer.value = '';
    fMilestoneCount.value = '';
    fMilestoneBonus.value = '';
    fPenalty.value = '';
    deleteBtn.style.display = 'none';
    overlay.classList.add('open');
    setTimeout(() => fName.focus(), 50);
  }

  function openEdit(id){
    const item = items.find(i => i.id === id);
    if(!item) return;
    editingId = id;
    modalTitle.textContent = '編輯簽到項目';
    fName.value = item.name;
    fIcon.value = item.icon || '👍';
    fColor.value = item.color || '#E85C8A';
    fPer.value = item.perCheckin;
    fMilestoneCount.value = item.milestoneCount || '';
    fMilestoneBonus.value = item.milestoneBonus || '';
    fPenalty.value = item.penaltyPerMiss || '';
    deleteBtn.style.display = 'inline-block';
    overlay.classList.add('open');
  }

  function closeModal(){
    overlay.classList.remove('open');
    editingId = null;
  }

  async function saveModal(){
    const name = fName.value.trim();
    if(!name){
      fName.focus();
      return;
    }
    const icon = fIcon.value.trim() || '👍';
    const color = fColor.value || '#E85C8A';
    const per = parseFloat(fPer.value) || 0;
    const mCount = fMilestoneCount.value ? parseInt(fMilestoneCount.value, 10) : null;
    const mBonus = fMilestoneBonus.value ? parseFloat(fMilestoneBonus.value) : null;
    const penalty = fPenalty.value ? parseFloat(fPenalty.value) : 0;

    if(editingId){
      const item = items.find(i => i.id === editingId);
      if(item){
        item.name = name;
        item.icon = icon;
        item.color = color;
        item.perCheckin = per;
        item.milestoneCount = mCount;
        item.milestoneBonus = mBonus;
        item.penaltyPerMiss = penalty;
      }
    } else {
      const eff = getEffectiveDateStr(new Date());
      const newItem = {
        id: uid(),
        name, icon, color, perCheckin: per,
        milestoneCount: mCount, milestoneBonus: mBonus,
        penaltyPerMiss: penalty,
        checkins: [], missed: [], lastSettledDate: eff
      };
      items.push(newItem);
      calSelected.push(newItem.id);
      await saveCalSelection();
    }
    await saveData();
    closeModal();
    render();
    renderCalendar();
  }

  async function deleteCurrent(){
    if(!editingId) return;
    items = items.filter(i => i.id !== editingId);
    calSelected = calSelected.filter(id => id !== editingId);
    await saveData();
    await saveCalSelection();
    closeModal();
    render();
    renderCalendar();
  }

  document.getElementById('openAddBtn').addEventListener('click', openAdd);
  document.getElementById('cancelBtn').addEventListener('click', closeModal);
  document.getElementById('saveBtn').addEventListener('click', saveModal);
  deleteBtn.addEventListener('click', deleteCurrent);
  overlay.addEventListener('click', (e) => { if(e.target === overlay) closeModal(); });

  loadData();
})();
</script>
</body>
</html>
